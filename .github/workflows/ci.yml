name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    name: "Test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sanitize: address,undefined
          - os: macos-latest
            sanitize: address

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Meson and Ninja
        run: python -m pip install --upgrade meson ninja

      - name: Configure (debug + tests)
        run: meson setup build --buildtype=debug -Dbuild_tests=true -Db_sanitize=${{ matrix.sanitize }}

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --verbose

  release-build:
    name: Release build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Meson and Ninja
        run: python -m pip install --upgrade meson ninja

      - name: Configure (release)
        run: meson setup build --buildtype=release -Dbuild_tests=false

      - name: Build
        run: meson compile -C build
