name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    name: "Test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sanitize: address,undefined
          - os: macos-latest
            sanitize: address

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Meson and Ninja
        run: python -m pip install --upgrade meson ninja

      - name: Configure (debug + tests)
        run: meson setup build --buildtype=debug -Dbuild_tests=true -Db_sanitize=${{ matrix.sanitize }}

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --verbose

  release-build:
    name: Release build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Meson and Ninja
        run: python -m pip install --upgrade meson ninja

      - name: Configure (release)
        run: meson setup build --buildtype=release -Dbuild_tests=false

      - name: Build
        run: meson compile -C build

  # ---------------------------------------------------------------------------
  # Code coverage gate. Builds with gcov instrumentation, runs the full
  # test suite, and fails the job if line or branch coverage drops below
  # the threshold.
  # ---------------------------------------------------------------------------
  coverage:
    name: "Coverage gate"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install ninja
        run: sudo apt-get update -q && sudo apt-get install -y ninja-build

      - name: Install meson and gcovr
        run: pip install meson gcovr

      - name: Configure (coverage)
        run: >
          meson setup build
          --buildtype=debug
          -Dbuild_tests=true
          -Db_coverage=true
          -Dc_args=-fprofile-update=atomic

      - name: Build
        run: meson compile -C build

      - name: Run tests
        run: meson test -C build --verbose

      - name: Generate coverage report
        run: |
          mkdir -p coverage-report
          gcovr \
            --root . \
            --filter 'src/' \
            --filter 'include/' \
            --html-details coverage-report/index.html \
            --txt coverage-report/summary.txt \
            --print-summary \
            --fail-under-line 80 \
            --fail-under-branch 70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
